<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Perfect Pronunciation | Accurate Pronunciation Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #f0f7ff 0%, #e9f0fa 100%);
            min-height: 100vh;

            justify-content: center;

        .app-container {
            max-width: 1300px;

            background: rgba(255, 255, 255, 0.75);

            border-radius: 3rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);

        .hero {
            background: linear-gradient(135deg, #1e2b3c, #0f2c3b);
            padding: 2rem;
            text-align: center;

            border-bottom-right-radius: 2rem;

        .hero p { font-size: 1.1rem; margin-top: 0.6rem; opacity: 0.9; }

        .practice-card {

            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1);
        }

        .word-area { text-align: center; margin-bottom: 2rem; }
        .current-prompt {
            font-size: 3rem;
            font-weight: 700;
            background: #f2f6fc;
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 70px;
            color: #0f2c3b;
        }

        .action-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin: 1.5rem 0; }

        .btn {
            border: none;
            padding: 0.8rem 1.6rem;
            border-radius: 50px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;

            transition: 0.2s;
            background: #f0f4f9;
        }

        .btn-primary { background: #2c7da0; color: white; }
        .btn-primary:hover { background: #1f6685; }
        .btn-outline { background: transparent; border: 1px solid #2c7da0; color: #2c7da0; }
        .btn-success { background: #27ae60; color: white; }

        .feedback {
            background: #eef2f7;

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(#2c7da0 0deg, #eef2f7 0deg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            position: relative;
        }

        .score-inner {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .score-number { font-size: 2.5rem; font-weight: 800; }
        .mistake-list { margin-top: 1rem; padding: 1rem; background: #fff3e0; border-radius: 1rem; border-left: 4px solid #e67e22; }
        .mistake-item { padding: 0.3rem 0; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }
        .perfect-badge { background: #27ae60; color: white; padding: 0.5rem 1rem; border-radius: 40px; display: inline-block; }

        .custom-section {
            background: #f8fafd;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-top: 1rem;
        }

        .input-group { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1rem; }
        .input-group input, .input-group textarea { flex: 1; padding: 0.8rem; border-radius: 40px; border: 1px solid #cbdde9; font-family: inherit; }

        .custom-badge { background: #e1ecf4; padding: 4px 12px; border-radius: 40px; display: inline-flex; align-items: center; gap: 6px; margin: 4px; }

        .footer-credit { text-align: center; padding: 1.5rem; background: #eef2f6; color: #2c5a74; border-top: 1px solid #dce5ec; }
        .footer-credit a { color: #1e5a7a; text-decoration: none; font-weight: 600; }

        .mic-listening { animation: pulse 1s infinite; background: #e67e22 !important; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        @keyframes gentlePop { 0% { transform: scale(0.96); } 100% { transform: scale(1); } }
        .animate-word { animation: gentlePop 0.3s ease; }

        @media (max-width: 650px) {
            .current-prompt { font-size: 2rem; }
            .hero h1 { font-size: 2rem; }
            .dashboard { padding: 1rem; }
        }
    </style>

<body>

<div class="app-container">
    <div class="hero">
        <h1>🗣️ Perfect Pronunciation</h1>
        <p>honest feedback · strict scoring · real improvement</p>
    </div>

    <div class="dashboard">
        <div class="level-section">
            <div class="level-label"><i class="fas fa-chart-line"></i> Level:</div>
            <div class="level-buttons" id="levelButtons">
                <button class="level-btn" data-level="A1">A1</button><button class="level-btn" data-level="A2">A2</button>
                <button class="level-btn" data-level="B1">B1</button><button class="level-btn" data-level="B2">B2</button>
                <button class="level-btn" data-level="C1">C1</button><button class="level-btn" data-level="C2">C2</button>
            </div>
            <div class="level-desc" id="levelDesc">📘 Beginner</div>
        </div>

        <div class="mode-selector">
            <button class="mode-btn" id="randomModeBtn"><i class="fas fa-shuffle"></i> Random</button>
            <button class="mode-btn" id="customModeBtn"><i class="fas fa-pen-fancy"></i> Custom</button>
        </div>

        <div class="practice-card">
            <div class="word-area">
                <div class="current-prompt" id="currentPromptDisplay">click mic</div>
                <div class="suggestion-hint" id="suggestionHint" style="margin-top: 1rem; color: #5f7f9a;">✨ say the word clearly</div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-primary" id="micBtn"><i class="fas fa-microphone"></i> Record & Check</button>
                <button class="btn" id="nextBtn"><i class="fas fa-arrow-right"></i> Next Word</button>
                <button class="btn btn-outline" id="listenBtn"><i class="fas fa-volume-up"></i> Listen</button>
            </div>
            <div class="feedback" id="feedbackArea">
                <div id="scoreDisplay"></div>
                <div id="mistakeDisplay"></div>
                <div id="feedbackText">Ready! Click Record & Check to practice.</div>
            </div>
        </div>

        <div id="customPanel" style="display: none;">
            <div class="custom-section">
                <h3><i class="fas fa-edit"></i> Your Words</h3>
                <div class="input-group">
                    <input type="text" id="singleWordInput" placeholder="Add a word or phrase">
                    <button class="btn btn-success" id="addWordBtn">+ Add</button>
                </div>
                <div class="input-group">
                    <textarea id="bulkWords" rows="2" placeholder="Paste multiple words separated by commas&#10;Example: beautiful, entrepreneur, I love English"></textarea>
                    <button class="btn btn-primary" id="importBtn">Import</button>
                </div>
                <div class="input-group">
                    <button class="btn btn-success" id="startCustomBtn"><i class="fas fa-play"></i> Start Practice</button>
                    <button class="btn btn-outline" id="resetCustomBtn">Reset</button>
                </div>
                <div id="customWordBadges" style="margin-top: 1rem;"></div>
            </div>
        </div>
    </div>
    <div class="footer-credit">
        made by englishteacher rush &nbsp;|&nbsp; 
        <a href="https://ntro077.github.io/my-teaching-site/" target="_blank">visit my website</a>
    </div>
</div>

<script>
    // Vocabulary by level
    const vocab = {
        A1: ["cat", "dog", "house", "happy", "apple", "water", "school", "book", "red", "blue"],
        A2: ["beautiful", "important", "delicious", "travel", "family", "interesting", "restaurant", "because"],
        B1: ["adventure", "challenge", "environment", "experience", "opportunity", "responsible", "schedule"],
        B2: ["entrepreneur", "flexible", "globalization", "innovative", "negotiate", "perspective"],
        C1: ["ephemeral", "fortuitous", "idiosyncrasy", "meticulous", "nuance", "paradigm"],
        C2: ["antediluvian", "esoteric", "ineffable", "labyrinthine", "metamorphosis"]
    };

    let currentLevel = "A1";
    let currentMode = "random";
    let currentWord = "cat";
    let customWords = ["apple", "beautiful", "challenge"];
    
    let recognition = null;
    let synth = window.speechSynthesis;
    let isListening = false;

    // DOM elements
    const randomBtn = document.getElementById('randomModeBtn');
    const customBtn = document.getElementById('customModeBtn');
    const customPanel = document.getElementById('customPanel');
    const wordDisplay = document.getElementById('currentPromptDisplay');
    const micBtn = document.getElementById('micBtn');
    const nextBtn = document.getElementById('nextBtn');
    const listenBtn = document.getElementById('listenBtn');
    const feedbackText = document.getElementById('feedbackText');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const mistakeDisplay = document.getElementById('mistakeDisplay');
    const suggestionHint = document.getElementById('suggestionHint');
    const levelDesc = document.getElementById('levelDesc');

    // ========== ULTRA STRICT PRONUNCIATION CHECKER ==========
    // This doesn't rely on the transcript being perfect - it does multiple layers of checking
    
    function strictCheck(expected, spoken, rawTranscript) {
        if (!spoken && !rawTranscript) return { score: 0, mistakes: ["No speech detected"] };
        
        const normExpected = expected.toLowerCase().trim().replace(/[^\w\s]/g, '');
        const normSpoken = (spoken || rawTranscript || "").toLowerCase().trim().replace(/[^\w\s]/g, '');
        
        // START WITH ZERO - only earn points by matching perfectly
        let totalPenalty = 0;
        let mistakes = [];
        
        // 1. EXACT CHARACTER MATCH - only way to get high score
        if (normExpected === normSpoken) {
            return { score: 100, mistakes: [], perfect: true };
        }
        
        // 2. Check if they're even close in length
        const lenDiff = Math.abs(normExpected.length - normSpoken.length);
        if (lenDiff > 3) {
            totalPenalty += 25;
            mistakes.push(`❌ Length mismatch: said "${normSpoken.length}" chars, expected "${normExpected.length}" (off by ${lenDiff})`);
        } else if (lenDiff > 0) {
            totalPenalty += lenDiff * 4;
            mistakes.push(`⚠️ Length off by ${lenDiff} character(s)`);
        }
        
        // 3. Character-by-character comparison with position tracking
        let correctChars = 0;
        const minLen = Math.min(normExpected.length, normSpoken.length);
        for (let i = 0; i < minLen; i++) {
            if (normExpected[i] === normSpoken[i]) {
                correctChars++;
            } else {
                mistakes.push(`🔤 Position ${i+1}: said "${normSpoken[i] || '?'}" instead of "${normExpected[i]}"`);
                totalPenalty += 3;
            }
        }
        
        // 4. Missing or extra characters at the end
        if (normSpoken.length > normExpected.length) {
            const extra = normSpoken.slice(normExpected.length);
            mistakes.push(`➕ Extra: "${extra}" at the end`);
            totalPenalty += extra.length * 3;
        } else if (normExpected.length > normSpoken.length) {
            const missing = normExpected.slice(normSpoken.length);
            mistakes.push(`➖ Missing: "${missing}" at the end`);
            totalPenalty += missing.length * 4;
        }
        
        // 5. Syllable check - VERY strict
        const expectedSyllables = countSyllablesStrict(normExpected);
        const spokenSyllables = countSyllablesStrict(normSpoken);
        if (expectedSyllables !== spokenSyllables) {
            const sylDiff = Math.abs(expectedSyllables - spokenSyllables);
            totalPenalty += sylDiff * 12;
            mistakes.push(`🎵 Syllables: expected ${expectedSyllables}, you said ${spokenSyllables} (${sylDiff} off)`);
        }
        
        // 6. Word count for phrases
        const expectedWords = normExpected.split(/\s+/);
        const spokenWords = normSpoken.split(/\s+/);
        if (expectedWords.length !== spokenWords.length) {
            totalPenalty += 20;
            mistakes.push(`📊 Word count: expected ${expectedWords.length} word(s), you said ${spokenWords.length}`);
        }
        
        // 7. Check if the spoken word is completely different
        const similarity = calculateSimilarity(normExpected, normSpoken);
        if (similarity < 0.5) {
            totalPenalty += 30;
            mistakes.unshift(`❌ Your pronunciation sounds very different from "${expected}"`);
        }
        
        // Calculate final score - start from 100, subtract penalties
        let finalScore = 100 - totalPenalty;
        
        // Hard cap: can't get above 85% if not exact match
        if (normExpected !== normSpoken && finalScore > 85) {
            finalScore = 85;
        }
        
        // If there are any mistakes, can't get above 90%
        if (mistakes.length > 0 && finalScore > 90) {
            finalScore = 89;
        }
        
        finalScore = Math.max(0, Math.min(100, Math.floor(finalScore)));
        
        // Remove duplicate mistakes
        const uniqueMistakes = [...new Map(mistakes.map(m => [m, m])).values()];
        
        return { score: finalScore, mistakes: uniqueMistakes.slice(0, 4), perfect: false };
    }
    
    function countSyllablesStrict(word) {
        word = word.toLowerCase();
        let count = 0;
        let vowels = 'aeiou';
        let lastWasVowel = false;
        
        for (let i = 0; i < word.length; i++) {
            if (vowels.includes(word[i])) {
                if (!lastWasVowel) {
                    count++;
                    lastWasVowel = true;
                }
            } else {
                lastWasVowel = false;
            }
        }
        
        if (word.endsWith('e')) count = Math.max(1, count - 1);
        if (word.endsWith('le') && word.length > 2 && !vowels.includes(word[word.length-3])) count++;
        
        return Math.max(1, count);
    }
    
    function calculateSimilarity(a, b) {
        if (a === b) return 1;
        const maxLen = Math.max(a.length, b.length);
        if (maxLen === 0) return 1;
        const distance = levenshtein(a, b);
        return (maxLen - distance) / maxLen;
    }
    
    function levenshtein(a, b) {
        const matrix = Array(b.length + 1).fill().map(() => Array(a.length + 1).fill(0));
        for (let i = 0; i <= a.length; i++) matrix[0][i] = i;
        for (let j = 0; j <= b.length; j++) matrix[j][0] = j;
        for (let j = 1; j <= b.length; j++) {
            for (let i = 1; i <= a.length; i++) {
                if (a[i-1] === b[j-1]) {
                    matrix[j][i] = matrix[j-1][i-1];
                } else {
                    matrix[j][i] = Math.min(matrix[j-1][i-1] + 1, matrix[j][i-1] + 1, matrix[j-1][i] + 1);
                }
            }
        }
        return matrix[b.length][a.length];
    }
    
    function getScoreColor(score) {
        if (score >= 90) return "#2c7da0";
        if (score >= 70) return "#27ae60";
        if (score >= 50) return "#e67e22";
        return "#e74c3c";
    }
    
    function updateUIWithResult(analysis, transcript) {
        const score = analysis.score;
        const color = getScoreColor(score);
        
        // Create circular score display
        const rotation = (score / 100) * 360;
        scoreDisplay.innerHTML = `
            <div class="score-circle" style="background: conic-gradient(${color} ${rotation}deg, #eef2f7 ${rotation}deg)">
                <div class="score-inner">
                    <div class="score-number" style="color: ${color}">${score}%</div>
                    <div style="font-size: 0.7rem; color: #666;">score</div>
                </div>
            </div>
        `;
        
        // Show mistakes
        if (analysis.perfect) {
            mistakeDisplay.innerHTML = `<div style="background: #e8f5e9; padding: 1rem; border-radius: 1rem; text-align: center;">
                <i class="fas fa-trophy" style="color: #27ae60; font-size: 1.5rem;"></i>
                <p style="margin-top: 0.5rem; font-weight: 600;">Perfect pronunciation! Excellent work!</p>
            </div>`;
            feedbackText.innerHTML = `🎉 You said: "${transcript}" - Perfect match!`;
        } else if (analysis.mistakes.length > 0) {
            mistakeDisplay.innerHTML = `
                <div class="mistake-list">
                    <strong><i class="fas fa-info-circle"></i> How to improve:</strong>
                    ${analysis.mistakes.map(m => `<div class="mistake-item"><i class="fas fa-arrow-right"></i> ${m}</div>`).join('')}
                </div>
            `;
            
            let feedbackMsg = `You said: "${transcript}". `;
            if (score >= 80) feedbackMsg += "Very close! Small adjustments needed.";
            else if (score >= 60) feedbackMsg += "Good attempt! Focus on the sounds above.";
            else if (score >= 40) feedbackMsg += "Keep practicing! Listen to the correct pronunciation.";
            else feedbackMsg += "Let's practice this more. Try listening and repeating.";
            
            feedbackText.innerHTML = feedbackMsg;
        } else {
            feedbackText.innerHTML = `You said: "${transcript}". Score: ${score}%. ${score >= 70 ? "Good work!" : "Keep practicing!"}`;
            mistakeDisplay.innerHTML = "";
        }
    }
    
    // Helper functions
    function speak(text, cancel = true) {
        if (!synth) return;
        if (cancel) synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.85;
        utterance.pitch = 1.0;
        utterance.lang = 'en-US';
        synth.speak(utterance);
    }
    
    function getRandomWord() {
        if (currentMode === "random") {
            const words = vocab[currentLevel];
            return words[Math.floor(Math.random() * words.length)];
        } else {
            if (customWords.length === 0) customWords = ["practice", "english"];
            return customWords[Math.floor(Math.random() * customWords.length)];
        }
    }
    
    function refreshDisplay() {
        wordDisplay.innerText = currentWord;
        suggestionHint.innerHTML = currentMode === "random" ? `🎯 Level ${currentLevel} · "${currentWord}"` : `📘 Custom: "${currentWord}"`;
        wordDisplay.classList.add('animate-word');
        setTimeout(() => wordDisplay.classList.remove('animate-word'), 300);
        scoreDisplay.innerHTML = "";
        mistakeDisplay.innerHTML = "";
        feedbackText.innerHTML = "Ready! Click Record & Check to practice.";
    }
    
    function nextWord() {
        if (isListening) return;
        currentWord = getRandomWord();
        refreshDisplay();
    }
    
    // Speech recognition setup
    function initRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            feedbackText.innerHTML = "❌ Speech recognition not supported in this browser. Try Chrome.";
            return false;
        }
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        return true;
    }
    
    async function startRecording() {
        if (isListening) return;
        
        if (!recognition && !initRecognition()) return;
        
        // Request microphone permission
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => track.stop());
        } catch (err) {
            feedbackText.innerHTML = "❌ Please allow microphone access to practice pronunciation.";
            return;
        }
        
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript.trim();
            const expected = currentWord;
            
            // Run the strict check
            const analysis = strictCheck(expected, transcript, transcript);
            updateUIWithResult(analysis, transcript);
            
            // Provide voice feedback for low scores
            if (analysis.score < 70) {
                setTimeout(() => speak(expected, true), 500);
            } else if (analysis.score >= 85 && !analysis.perfect) {
                speak("Good job", true);
            } else if (analysis.perfect) {
                speak("Excellent", true);
            }
            
            isListening = false;
            micBtn.classList.remove('mic-listening');
            micBtn.innerHTML = '<i class="fas fa-microphone"></i> Record & Check';
        };
        
        recognition.onerror = (event) => {
            let errorMsg = "";
            if (event.error === 'not-allowed') errorMsg = "❌ Microphone access denied.";
            else if (event.error === 'no-speech') errorMsg = "🎤 No speech detected. Please speak clearly.";
            else errorMsg = `Error: ${event.error}. Please try again.`;
            feedbackText.innerHTML = errorMsg;
            isListening = false;
            micBtn.classList.remove('mic-listening');
            micBtn.innerHTML = '<i class="fas fa-microphone"></i> Record & Check';
        };
        
        recognition.onend = () => {
            if (isListening) {
                isListening = false;
                micBtn.classList.remove('mic-listening');
                micBtn.innerHTML = '<i class="fas fa-microphone"></i> Record & Check';
            }
        };
        
        try {
            recognition.start();
            isListening = true;
            micBtn.classList.add('mic-listening');
            micBtn.innerHTML = '<i class="fas fa-microphone-slash"></i> Listening...';
            feedbackText.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Listening... speak clearly!';
            scoreDisplay.innerHTML = "";
            mistakeDisplay.innerHTML = "";
        } catch (err) {
            feedbackText.innerHTML = "⚠️ Please click again to record.";
            isListening = false;
        }
    }
    
    // UI functions
    function setLevel(level) {
        currentLevel = level;
        document.querySelectorAll('.level-btn').forEach(btn => {
            if (btn.getAttribute('data-level') === level) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        const levelNames = { A1: "📘 Beginner", A2: "📙 Elementary", B1: "📗 Intermediate", B2: "📕 Upper Intermediate", C1: "📖 Advanced", C2: "🔮 Mastery" };
        levelDesc.innerHTML = levelNames[level];
        if (currentMode === "random") {
            currentWord = getRandomWord();
            refreshDisplay();
        }
        feedbackText.innerHTML = `Level ${level}. Ready to practice!`;
    }
    
    function setMode(mode) {
        currentMode = mode;
        if (mode === "random") {
            randomBtn.classList.add("active");
            customBtn.classList.remove("active");
            customPanel.style.display = "none";
            currentWord = getRandomWord();
            refreshDisplay();
            feedbackText.innerHTML = "Random mode active. Words from your level!";
        } else {
            customBtn.classList.add("active");
            randomBtn.classList.remove("active");
            customPanel.style.display = "block";
            if (customWords.length === 0) customWords = ["apple", "beautiful"];
            currentWord = customWords[0];
            refreshDisplay();
            feedbackText.innerHTML = "Custom mode! Add your words below.";
        }
    }
    
    function updateCustomBadges() {
        const container = document.getElementById('customWordBadges');
        container.innerHTML = "";
        customWords.forEach(w => {
            const badge = document.createElement('span');
            badge.className = 'custom-badge';
            badge.innerHTML = `${w} <i class="fas fa-times-circle" style="cursor:pointer;" data-word="${w}"></i>`;
            badge.querySelector('i').addEventListener('click', (e) => {
                const word = e.target.getAttribute('data-word');
                customWords = customWords.filter(c => c !== word);
                if (customWords.length === 0) customWords = ["practice"];
                if (currentMode === "custom" && !customWords.includes(currentWord)) {
                    currentWord = customWords[0];
                    refreshDisplay();
                }
                updateCustomBadges();
            });
            container.appendChild(badge);
        });
    }
    
    function addWord() {
        const input = document.getElementById('singleWordInput');
        const newWord = input.value.trim();
        if (!newWord) return;
        customWords.push(newWord);
        updateCustomBadges();
        input.value = "";
        feedbackText.innerHTML = `✅ Added "${newWord}"`;
    }
    
    function importWords() {
        const textarea = document.getElementById('bulkWords');
        const raw = textarea.value;
        if (!raw.trim()) return;
        const items = raw.split(/[,\n]/).map(s => s.trim()).filter(s => s.length > 0);
        if (items.length === 0) return;
        customWords = items;
        updateCustomBadges();
        if (currentMode === "custom") {
            currentWord = customWords[0];
            refreshDisplay();
        }
        textarea.value = "";
        feedbackText.innerHTML = `✅ Imported ${customWords.length} words!`;
    }
    
    function startCustomPractice() {
        if (customWords.length === 0) {
            feedbackText.innerHTML = "📝 Please add words first!";
            return;
        }
        currentWord = customWords[Math.floor(Math.random() * customWords.length)];
        refreshDisplay();
        document.querySelector('.practice-card').scrollIntoView({ behavior: 'smooth' });
        speak(currentWord, true);
        feedbackText.innerHTML = `🎯 Practicing: "${currentWord}". Click Record & Check!`;
    }
    
    function resetCustomList() {
        customWords = ["apple", "beautiful", "challenge", "serendipity"];
        updateCustomBadges();
        if (currentMode === "custom") {
            currentWord = customWords[0];
            refreshDisplay();
        }
        feedbackText.innerHTML = "🔄 Custom list reset!";
    }
    
    // Event listeners
    document.querySelectorAll('.level-btn').forEach(btn => {
        btn.addEventListener('click', () => setLevel(btn.getAttribute('data-level')));
    });
    randomBtn.addEventListener('click', () => setMode("random"));
    customBtn.addEventListener('click', () => setMode("custom"));
    micBtn.addEventListener('click', startRecording);
    nextBtn.addEventListener('click', nextWord);
    listenBtn.addEventListener('click', () => speak(currentWord, true));
    document.getElementById('addWordBtn').addEventListener('click', addWord);
    document.getElementById('importBtn').addEventListener('click', importWords);
    document.getElementById('startCustomBtn').addEventListener('click', startCustomPractice);
    document.getElementById('resetCustomBtn').addEventListener('click', resetCustomList);
    
    // Initialize
    updateCustomBadges();
    setLevel("A1");
    setMode("random");
    setTimeout(() => speak("Welcome to Perfect Pronunciation", true), 500);
</script>
</body>
</html>
